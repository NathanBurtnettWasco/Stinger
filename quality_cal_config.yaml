app:
  name: "Quality Calibration"
  version: "0.1.0"

hardware:
  labjack:
    device_type: "T7"
    connection_type: "USB"
    identifier: "ANY"
    resolution_index: 9
    pressure_filter_alpha: 0.0
    # Druck UNIK 5000 PMP50D6-* sensors are amplified 0-10 V, 4-wire units.
    # Current hardware under test is 30 PSIA absolute.
    port_a:
      transducer_ain: 0
      transducer_ain_neg: 1
      transducer_voltage_min: 0
      transducer_voltage_max: 10
      transducer_pressure_min: 0.0
      transducer_pressure_max: 30
      transducer_reference: "absolute"
      switch_no_dio: 2
      switch_nc_dio: 0
      switch_com_dio: 3
      switch_com_state: 0
      switch_active_low: true
      solenoid_dio: 19
    port_b:
      transducer_ain: 2
      transducer_ain_neg: 3
      transducer_voltage_min: 0
      transducer_voltage_max: 10
      transducer_pressure_min: 0.0
      transducer_pressure_max: 30
      transducer_reference: "absolute"
      switch_no_dio: 9
      switch_nc_dio: 11
      switch_com_dio: 12
      switch_com_state: 0
      switch_active_low: true
      solenoid_dio: 18
  alicat:
    baudrate: 115200
    timeout_s: 0.05
    auto_tare_on_connect: true
    auto_tare_max_delta_psi: 0.5
    auto_tare_delay_s: 0.5
    pressure_units_stat: 2
    pressure_units_group: 0
    pressure_units_value: 10
    pressure_units_override: 0
    pressure_index: 0
    gauge_index: 1
    barometric_index: 2
    setpoint_index: 3
    port_a:
      com_port: "COM9"
      address: "A"
    port_b:
      com_port: "COM9"
      address: "B"
  solenoid:
    vacuum_state: 1
    atmosphere_state: 0
    safe_vacuum_switch_threshold_psi: 2.0
  mensor:
    port: "COM10"
    baudrate: 57600
    timeout_s: 1.0

quality:
  hardware_check_poll_interval_ms: 2000
  hardware_discovery:
    enable_serial_auto_discovery: true
    preferred_serial_ports:
      - "COM9"
      - "COM10"
  pressure_schedule:
    start_psia: 0.0
    dense_up_to_psia: 30.0
    dense_step_psia: 1.0
    medium_up_to_psia: 30.0
    medium_step_psia: 2.0
    max_psia: 30.0
    high_step_psia: 5.0
  pressure_tolerance_psia: 0.06
  settle_tolerance_psia: 0.4
  settle_hold_s: 5.0
  settle_timeout_s: 180.0
  static_hold_s: 8.0
  sample_hz: 4.0
  leak_check:
    target_psia: 100.0
    duration_s: 90.0
    sample_hz: 4.0
    max_rate_psi_per_min: 0.2
    ramp_rate_psi_per_s: 8.0
  report:
    output_dir: "I:\\Level 5 Documentation\\Records\\Calibration Certificates"
    template_path: "I:\\Level 5 Documentation\\Quality Forms\\QF87 Calibration Certificate_Teststands_Rev 000.docx"
    filename_prefix: "QualityCalibration"

logging:
  level: INFO
  log_dir: "logs"
  max_bytes: 10485760
  backup_count: 5
