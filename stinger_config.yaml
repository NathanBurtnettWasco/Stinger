# Stinger Test Stand Configuration

app:
  name: "Stinger"
  version: "0.1.0"

hardware:
  labjack:
    device_type: "T7"
    connection_type: "USB"
    identifier: "ANY"
    resolution_index: 9         # 0=auto, 1-8=16-bit ADC, 9-12=24-bit ADC (T7-Pro only)
    pressure_filter_alpha: 0.0  # EMA smoothing factor (0=off, 1=no filtering, 0.4=moderate)
    port_a:
      transducer_ain: 0
      transducer_ain_neg: 1
      transducer_voltage_min: 0.5
      transducer_voltage_max: 4.5
      transducer_pressure_min: 0.0
      transducer_pressure_max: 115.0
      transducer_reference: "absolute"
      transducer_offset_psi: -0.383
      switch_no_dio: 2
      switch_nc_dio: 0
      switch_com_dio: 3
      switch_com_state: 0
      switch_active_low: true
      solenoid_dio: 19

    port_b:
      transducer_ain: 2
      transducer_ain_neg: 3
      transducer_voltage_min: 0.5
      transducer_voltage_max: 4.5
      transducer_pressure_min: 0.0
      transducer_pressure_max: 115.0
      transducer_reference: "absolute"
      transducer_offset_psi: 0.09
      switch_no_dio: 9
      switch_nc_dio: 11
      switch_com_dio: 12
      switch_com_state: 0
      switch_active_low: true
      solenoid_dio: 18

  alicat:
    baudrate: 19200
    timeout_s: 0.05
    auto_tare_on_connect: true
    auto_tare_max_delta_psi: 0.5
    auto_tare_delay_s: 0.5
    pressure_units_stat: 2
    pressure_units_group: 0
    pressure_units_value: 10
    pressure_units_override: 0
    pressure_index: 0
    gauge_index: 1
    barometric_index: 2
    setpoint_index: 3

    port_a:
      com_port: "COM9"
      address: "A"

    port_b:
      com_port: "COM9"
      address: "B"

  solenoid:
    vacuum_state: 1
    atmosphere_state: 0
    safe_vacuum_switch_threshold_psi: 2.0

  measurement:
    preferred_source: "transducer"
    fallback_on_unavailable: true

control:
  ramps:
    precision_sweep_rate_torr_per_sec: 5.0

  cycling:
    num_cycles: 3

  edge_detection:
    overshoot_beyond_limit_percent: 10.0
    timeout_sec: 60.0

  debounce:
    stable_sample_count: 3
    min_edge_interval_ms: 50

timing:
  ui_refresh_interval_ms: 16
  hardware_poll_interval_ms: 7
  alicat_poll_divisor: 10        # Read Alicat every Nth fast cycle (~70-100ms)
  button_lockout_ms: 300
  graceful_stop_timeout_sec: 5.0

database:
  type: mssql
  server: "PASCAL"
  database: "WASCO_Calibration"
  driver: "ODBC Driver 18 for SQL Server"
  username: "MAXSQLAdmin"
  password: "M@x@dm1n"
  connection_timeout_sec: 5.0

ui:
  theme: "dark"
  min_touch_target_px: 44
  admin_pin: "2245"

  pressure_display:
    decimal_places: 2

  pressure_bar:
    show_atmosphere_reference: true
    show_acceptance_bands: true
    show_measured_points: true

test_parameters:
  equipment_id: "STINGER_01"
  default_temperature_c: 25.0
  max_attempts: 3

logging:
  level: DEBUG
  log_dir: "logs"
  max_bytes: 10485760
  backup_count: 5
